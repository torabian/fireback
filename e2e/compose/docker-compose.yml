services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: fireback
      POSTGRES_PASSWORD: fireback
      POSTGRES_DB: fireback

    ports:
      - "5432:5432"

  fireback:
    image: alitorabian2/fireback:latest

    depends_on:
      - postgres

    command: ./fireback start

    ports:
      - "4500:4500"

    environment:
      DB_VENDOR: postgres
      DB_HOST: postgres
      DB_NAME: fireback
      DB_PASSWORD: fireback
      DB_USERNAME: fireback
      DB_PORT: 5432