name: izaTheme
# This is a Module3.yml file format which is a complex definition of entities,
# actions, dtos, queries, and many more necessary things for a project.
# Make sure you have installed correct vscode extensions, to get intelisense and auto-save feature.
# You can read about extensions here:
# https://torabian.github.io/fireback/docs/vscode-extension-and-developing

# also learn how to create Module3.yml files:
# https://torabian.github.io/fireback/docs/module3-definition/

acts:
  - name: HomePage
    url: /
    description: Homepage of the shop
    method: get
    out:
      primitive: string
  - name: ProductSingleScreen
    url: /product/:id
    method: get
    description: 
      When a user opens a product single screen
    out:
      primitive: string

dtom:
  - name: ProductSummary
    description: 
      General information about a product, when it's shown in lists, categories,
      and places which user might click and go there. It doesn't have extended data
      at all, rather minimal information
    fields:
      - name: name
        type: string
        description: Product name, used in titles.